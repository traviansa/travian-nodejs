<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ترافيان الأول - Travian First</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        header p {
            font-size: 1.1em;
            color: #ffd700;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        .status {
            background: #f0f8ff;
            border-left: 4px solid #4CAF50;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .status.error {
            background: #ffebee;
            border-left-color: #f44336;
        }

        .status h3 {
            color: #4CAF50;
            margin-bottom: 10px;
        }

        .status.error h3 {
            color: #f44336;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .menu-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            display: block;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .menu-item h4 {
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .menu-item p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .data-display {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .data-display pre {
            background: white;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 0.9em;
        }

        footer {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            text-align: center;
            padding: 20px;
            border-top: 3px solid #ffd700;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            color: #f44336;
            padding: 10px;
            background: #ffebee;
            border-radius: 5px;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 20px;
            }

            .menu {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>⚔️ ترافيان الأول</h1>
        <p>Travian First - لعبة حرب ملحمية متعددة اللاعبين</p>
    </header>

    <main>
        <div class="container">
            <div id="status-container"></div>

            <div class="menu">
                <a href="#" onclick="loadPlayers(); return false;" class="menu-item">
                    <h4>👥 اللاعبين</h4>
                    <p>عرض قائمة اللاعبين</p>
                </a>
                <a href="#" onclick="loadVillages(); return false;" class="menu-item">
                    <h4>🏘️ القرى</h4>
                    <p>عرض القرى المتاحة</p>
                </a>
                <a href="#" onclick="loadStats(); return false;" class="menu-item">
                    <h4>📊 الإحصائيات</h4>
                    <p>إحصائيات اللعبة</p>
                </a>
                <a href="#" onclick="loadHealth(); return false;" class="menu-item">
                    <h4>🏥 الحالة</h4>
                    <p>حالة الخادم</p>
                </a>
            </div>

            <div id="data-container"></div>
        </div>
    </main>

    <footer>
        <p>© 2026 ترافيان الأول - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        const API_BASE = '/api';

        async function loadStatus() {
            try {
                const response = await fetch('/');
                const data = await response.json();
                
                const statusHtml = `
                    <div class="status ${data.dbConnected ? '' : 'error'}">
                        <h3>${data.dbConnected ? '✅ متصل' : '⚠️ قيد الاتصال'}</h3>
                        <p><strong>الحالة:</strong> ${data.status}</p>
                        <p><strong>قاعدة البيانات:</strong> ${data.dbConnected ? 'متصلة' : 'جاري الاتصال...'}</p>
                        <p><strong>الوقت:</strong> ${new Date(data.timestamp).toLocaleString('ar-SA')}</p>
                    </div>
                `;
                
                document.getElementById('status-container').innerHTML = statusHtml;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadPlayers() {
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/players`);
                const data = await response.json();
                
                if (data.success) {
                    displayData('👥 اللاعبين', data.data);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError(error.message);
            }
        }

        async function loadVillages() {
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/villages`);
                const data = await response.json();
                
                if (data.success) {
                    displayData('🏘️ القرى', data.data);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError(error.message);
            }
        }

        async function loadStats() {
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const data = await response.json();
                
                if (data.success) {
                    displayData('📊 الإحصائيات', data.stats);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError(error.message);
            }
        }

        async function loadHealth() {
            showLoading();
            try {
                const response = await fetch('/health');
                const data = await response.json();
                displayData('🏥 حالة الخادم', data);
            } catch (error) {
                showError(error.message);
            }
        }

        function displayData(title, data) {
            const dataHtml = `
                <div class="data-display">
                    <h3>${title}</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>
            `;
            document.getElementById('data-container').innerHTML = dataHtml;
        }

        function showLoading() {
            document.getElementById('data-container').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>جاري التحميل...</p>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('data-container').innerHTML = `
                <div class="error-message">
                    ❌ خطأ: ${message}
                </div>
            `;
        }

        // Load status on page load
        window.addEventListener('load', loadStatus);
    </script>
</body>
</html>
