<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجيش - ترافيان الأول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e3c72;
            --secondary: #ffd700;
            --danger: #ff6b6b;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #2a5298 100%);
            color: #333;
            min-height: 100vh;
        }

        header {
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 15px 30px;
            border-bottom: 3px solid var(--secondary);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5em;
            font-weight: 900;
        }

        .btn {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }

        .btn:hover {
            background: #0f1f3f;
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            color: white;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-align: center;
        }

        .army-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .section {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .section-header {
            background: linear-gradient(135deg, var(--primary) 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            font-size: 1.3em;
            font-weight: 700;
        }

        .section-body {
            padding: 20px;
        }

        .unit-item {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .unit-item:last-child {
            border-bottom: none;
        }

        .unit-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .unit-icon {
            font-size: 2em;
        }

        .unit-details {
            display: flex;
            flex-direction: column;
        }

        .unit-name {
            font-weight: 600;
            color: var(--primary);
        }

        .unit-stats {
            font-size: 0.85em;
            color: #666;
        }

        .unit-count {
            text-align: center;
            font-size: 1.5em;
            font-weight: 700;
            color: var(--primary);
        }

        .unit-actions {
            display: flex;
            gap: 8px;
        }

        .unit-btn {
            flex: 1;
            padding: 8px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .unit-btn:hover {
            background: #0f1f3f;
        }

        .unit-btn.attack {
            background: var(--danger);
        }

        .unit-btn.attack:hover {
            background: #ff5252;
        }

        .attack-form {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary);
        }

        .form-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: 'Cairo', sans-serif;
            font-size: 1em;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .attack-btn {
            width: 100%;
            padding: 12px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 6px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }

        .attack-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .army-container {
                grid-template-columns: 1fr;
            }

            .unit-item {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">⚔️ الجيش</div>
            <button class="btn" onclick="goHome()">🏠 الرئيسية</button>
        </div>
    </header>

    <main>
        <h1 class="page-title">⚔️ إدارة الجيش والهجمات</h1>

        <div class="army-container">
            <!-- My Army -->
            <div class="section">
                <div class="section-header">👥 جيشي</div>
                <div class="section-body" id="myArmyList"></div>
            </div>

            <!-- Attack Form -->
            <div class="section">
                <div class="section-header">🎯 شن هجوم</div>
                <div class="section-body">
                    <div class="attack-form">
                        <div class="form-group">
                            <label class="form-label">إحداثيات الهدف</label>
                            <input type="text" class="form-input" placeholder="مثال: 50, 75" id="targetCoords">
                        </div>

                        <div class="form-group">
                            <label class="form-label">عدد الجنود</label>
                            <input type="number" class="form-input" placeholder="أدخل العدد" id="armyCount" min="1">
                        </div>

                        <button class="attack-btn" onclick="launchAttack()">🚀 شن الهجوم</button>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="totalUnits">0</div>
                            <div class="stat-label">إجمالي الجنود</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="totalPower">0</div>
                            <div class="stat-label">القوة الإجمالية</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="armyReady">0</div>
                            <div class="stat-label">جاهز للهجوم</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Attacks -->
        <div class="section">
            <div class="section-header">📜 آخر الهجمات</div>
            <div class="section-body" id="recentAttacks"></div>
        </div>
    </main>

    <script>
        const UNITS = [
            { id: 1, name: 'الفارس', icon: '🐴', count: 50, attack: 80, defense: 40, speed: 60 },
            { id: 2, name: 'الرامي', icon: '🏹', count: 100, attack: 60, defense: 20, speed: 30 },
            { id: 3, name: 'الجندي', icon: '🗡️', count: 200, attack: 40, defense: 60, speed: 20 },
            { id: 4, name: 'الكاتافولت', icon: '🎯', count: 10, attack: 120, defense: 10, speed: 10 }
        ];

        const RECENT_ATTACKS = [
            { id: 1, target: '(45, 60)', units: 150, result: 'نصر', date: 'اليوم' },
            { id: 2, target: '(50, 75)', units: 200, result: 'هزيمة', date: 'أمس' },
            { id: 3, target: '(30, 40)', units: 100, result: 'نصر', date: 'قبل يومين' }
        ];

        // Initialize
        window.addEventListener('load', () => {
            displayMyArmy();
            displayRecentAttacks();
            updateStats();
        });

        // Display my army
        function displayMyArmy() {
            const list = document.getElementById('myArmyList');
            list.innerHTML = UNITS.map(unit => `
                <div class="unit-item">
                    <div class="unit-info">
                        <div class="unit-icon">${unit.icon}</div>
                        <div class="unit-details">
                            <div class="unit-name">${unit.name}</div>
                            <div class="unit-stats">⚔️ ${unit.attack} | 🛡️ ${unit.defense}</div>
                        </div>
                    </div>
                    <div class="unit-count">${unit.count}</div>
                    <div class="unit-actions">
                        <button class="unit-btn" onclick="trainUnit(${unit.id})">📈 تدريب</button>
                        <button class="unit-btn attack" onclick="selectUnit(${unit.id})">🎯 اختيار</button>
                    </div>
                </div>
            `).join('');
        }

        // Display recent attacks
        function displayRecentAttacks() {
            const list = document.getElementById('recentAttacks');
            list.innerHTML = RECENT_ATTACKS.map(attack => `
                <div class="unit-item">
                    <div>
                        <div class="unit-name">الهدف: ${attack.target}</div>
                        <div class="unit-stats">عدد الجنود: ${attack.units}</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="color: ${attack.result === 'نصر' ? '#51cf66' : '#ff6b6b'}; font-weight: 700;">
                            ${attack.result}
                        </div>
                        <div class="unit-stats">${attack.date}</div>
                    </div>
                </div>
            `).join('');
        }

        // Update stats
        function updateStats() {
            const totalUnits = UNITS.reduce((sum, u) => sum + u.count, 0);
            const totalPower = UNITS.reduce((sum, u) => sum + (u.count * u.attack), 0);
            
            document.getElementById('totalUnits').textContent = totalUnits;
            document.getElementById('totalPower').textContent = totalPower;
            document.getElementById('armyReady').textContent = Math.floor(totalUnits * 0.8);
        }

        // Train unit
        function trainUnit(unitId) {
            alert(`تم بدء تدريب الوحدة #${unitId}`);
        }

        // Select unit
        function selectUnit(unitId) {
            const unit = UNITS.find(u => u.id === unitId);
            document.getElementById('armyCount').value = Math.floor(unit.count * 0.5);
        }

        // Launch attack
        function launchAttack() {
            const coords = document.getElementById('targetCoords').value;
            const count = document.getElementById('armyCount').value;

            if (!coords || !count) {
                alert('الرجاء ملء جميع الحقول');
                return;
            }

            alert(`تم شن هجوم على ${coords} بـ ${count} جندي`);
        }

        // Go home
        function goHome() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
