version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=travian
      - DB_PASSWORD=travian123
      - DB_NAME=travian
      - PORT=8080
    depends_on:
      - db
    networks:
      - travian-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_USER=travian
      - MYSQL_PASSWORD=travian123
      - MYSQL_DATABASE=travian
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - travian-network
    restart: unless-stopped

volumes:
  db_data:

networks:
  travian-network:
    driver: bridge
